# Upstreams
upstream arterio_web { server web:3000; }
upstream arterio_api { server api:4000; }

# HTTP → HTTPS redirect
server {
  listen 80;
  server_name _;

  # ACME challenge for Let's Encrypt (certbot webroot)
  location /.well-known/acme-challenge/ { root /var/www/certbot; }

  location / { return 301 https://$host$request_uri; }
}

# HTTPS
server {
  listen 443 ssl;
  http2 on;
  server_name _;

  # Provide your certificate + key (or mount Let's Encrypt live dir here).
  ssl_certificate     /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;

  # Modern TLS
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  # Security headers
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # API
  location /api/ {
    limit_req zone=api burst=40 nodelay;
    proxy_pass http://arterio_api/;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Stricter limit on auth endpoints (brute-force protection)
  location /api/auth/ {
    limit_req zone=auth burst=10 nodelay;
    proxy_pass http://arterio_api/auth/;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Web (Next.js)
  location / {
    proxy_pass http://arterio_web;
    proxy_http_version 1.1;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
