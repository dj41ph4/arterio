# =============================================================================
#  Arterio — full stack (Postgres · Redis · Elasticsearch · MinIO · API · Web · Nginx)
#  Usage:  cp ../.env.example ../.env  &&  docker compose up -d
#  Designed to run identically on Linux, a VPS, cloud, or a Synology NAS.
# =============================================================================

name: arterio

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-arterio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-production}
      POSTGRES_DB: ${POSTGRES_DB:-arterio}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-arterio}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [arterio]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [arterio]

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - 'ES_JAVA_OPTS=-Xms512m -Xmx512m'
    ulimits:
      memlock: { soft: -1, hard: -1 }
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks: [arterio]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-arterio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-change-me-in-production}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 15s
      timeout: 10s
      retries: 5
    networks: [arterio]

  # Creates the media bucket on first boot, then exits.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-arterio} ${S3_SECRET_KEY:-change-me-in-production};
      mc mb --ignore-existing local/${S3_BUCKET:-arterio-media};
      mc anonymous set download local/${S3_BUCKET:-arterio-media};
      exit 0;
      "
    networks: [arterio]

  api:
    build:
      context: ..
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-arterio}:${POSTGRES_PASSWORD:-change-me-in-production}@postgres:5432/${POSTGRES_DB:-arterio}?schema=public
      REDIS_URL: redis://redis:6379
      ELASTICSEARCH_NODE: http://elasticsearch:9200
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [arterio]

  web:
    build:
      context: ..
      dockerfile: infra/docker/web.Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      API_URL: http://api:4000
    depends_on: [api]
    networks: [arterio]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/www:/var/www/certbot:ro
    depends_on: [web, api]
    networks: [arterio]

  # Issues/renews the Let's Encrypt certificate via the HTTP-01 webroot challenge.
  # Not started by `up -d` (no restart policy) — invoked on demand by the Windows
  # installer/renewal scripts: `docker compose run --rm certbot ...`.
  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./nginx/letsencrypt:/etc/letsencrypt
      - ./nginx/www:/var/www/certbot
      - ./nginx/certs:/etc/nginx/certs
    networks: [arterio]

volumes:
  pgdata:
  redisdata:
  esdata:
  miniodata:

networks:
  arterio:
    driver: bridge
