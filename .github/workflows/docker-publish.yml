name: Build and publish Docker images

# Builds the api + web images and pushes them to Docker Hub on every push to
# main. This is what the Synology NAS / Windows install pulls from — see
# infra/synology/README.md. No source code needs to live on the NAS.
#
# Requires two repository secrets (Settings > Secrets and variables > Actions):
#   DOCKERHUB_USERNAME — your Docker Hub username
#   DOCKERHUB_TOKEN     — a Docker Hub access token (hub.docker.com > Account
#                         Settings > Security > New Access Token; NOT your
#                         account password)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch: {}

env:
  OWNER: dj41ph4

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        component: [api, web]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ env.OWNER }}/arterio-${{ matrix.component }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=tag

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/${{ matrix.component }}.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
